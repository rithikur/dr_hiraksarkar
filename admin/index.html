<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Dr. Hirak Sarkar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { bg: '#F0ECE5', card: '#FDFDFB', fg: '#1C1A19', accent: '#D97354', 'accent-bright': '#E68264' },
          fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] }
        }
      }
    }
  </script>
  <style>
    .loader { border-top-color: #D97354; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 bg-bg text-fg font-sans relative z-10">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="w-full max-w-md p-8 bg-card border border-fg/10 mt-20 shadow-[0_8px_30px_rgba(26,23,20,0.09)] relative z-20">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">Admin Login</h1>
      <p class="text-fg/60 text-sm font-mono uppercase tracking-widest">Content Manager</p>
    </div>
    
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-mono font-bold text-accent uppercase tracking-wider mb-1">Username</label>
        <input type="text" id="username" placeholder="Enter username" class="w-full bg-bg border border-fg/20 px-4 py-2 text-fg focus:outline-none focus:border-accent transition-colors">
      </div>
      <div>
        <label class="block text-xs font-mono font-bold text-accent uppercase tracking-wider mb-1">Password</label>
        <input type="password" id="password" placeholder="Enter password" class="w-full bg-card border border-fg/20 px-4 py-2 text-fg focus:outline-none focus:border-accent transition-colors">
      </div>
      <button onclick="login()" class="w-full bg-fg hover:bg-accent text-bg font-bold font-mono uppercase tracking-wider py-3 transition duration-200 mt-4 flex justify-center items-center border border-transparent">
        <span id="login-text">Login</span>
        <div id="login-loader" class="loader ease-linear rounded-full border-2 border-t-2 border-bg h-5 w-5 ml-2 hidden"></div>
      </button>
      <div id="login-error" class="text-red-500 text-sm mt-2 hidden text-center">Invalid credentials.</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="w-full max-w-6xl hidden flex-col h-[90vh] relative z-20">
    <header class="bg-card border border-fg/10 flex justify-between items-center p-4 mb-6 shadow-sm">
      <h1 class="text-2xl font-bold flex items-center font-mono uppercase tracking-wider"><span class="bg-accent text-bg px-2 py-1 mr-3 text-sm">CMS</span> Content Manager</h1>
      <div class="flex gap-4">
        <button onclick="saveChanges()" class="bg-accent hover:bg-accent-bright text-white px-6 py-2 font-mono uppercase text-sm tracking-wider transition duration-200 flex items-center border border-transparent">
          <span id="save-text">Save Database</span>
          <div id="save-loader" class="loader ease-linear rounded-full border-2 border-t-2 border-white h-4 w-4 ml-2 hidden"></div>
        </button>
        <button onclick="logout()" class="bg-bg border border-fg/20 hover:border-fg text-fg px-4 py-2 font-mono uppercase text-sm tracking-wider transition duration-200">Logout</button>
      </div>
    </header>

    <div class="flex gap-6 flex-1 overflow-hidden">
      <!-- SIDEBAR -->
      <aside class="bg-card border border-fg/10 w-64 p-4 flex flex-col gap-2">
        <button onclick="switchTab('about')" class="tab-btn w-full text-left px-4 py-3 bg-fg text-bg font-mono uppercase text-sm tracking-wider transition border border-transparent" id="btn-tab-about">About & Bio</button>
        <button onclick="switchTab('projects')" class="tab-btn w-full text-left px-4 py-3 text-fg hover:bg-bg font-mono uppercase text-sm tracking-wider transition border border-transparent" id="btn-tab-projects">Projects</button>
        <button onclick="switchTab('publications')" class="tab-btn w-full text-left px-4 py-3 text-fg hover:bg-bg font-mono uppercase text-sm tracking-wider transition border border-transparent" id="btn-tab-publications">Publications</button>
        <button onclick="switchTab('teaching')" class="tab-btn w-full text-left px-4 py-3 text-fg hover:bg-bg font-mono uppercase text-sm tracking-wider transition border border-transparent" id="btn-tab-teaching">Teaching</button>
        <button onclick="switchTab('stats')" class="tab-btn w-full text-left px-4 py-3 text-fg hover:bg-bg font-mono uppercase text-sm tracking-wider transition border border-transparent" id="btn-tab-stats">Statistics</button>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="bg-card border border-fg/10 flex-1 p-8 overflow-y-auto relative">
        <div id="status-msg" class="absolute top-4 right-4 bg-[#D97354] text-white px-4 py-2 text-sm font-mono uppercase tracking-wider hidden shadow-md z-50">Saved successfully!</div>
        
        <!-- ABOUT TAB -->
        <div id="tab-about" class="tab-content space-y-6">
          <h2 class="text-xl font-bold mb-4 border-b border-fg/10 pb-2 font-mono uppercase tracking-widest text-accent">Edit About Section</h2>
          <div>
            <label class="block text-sm font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Years of Experience</label>
            <input type="text" id="about-exp" class="w-full bg-bg border border-fg/20 px-4 py-2 text-fg focus:outline-none focus:border-accent" oninput="updateData('about', 'experienceYears', this.value)">
          </div>
          <div>
            <label class="block text-sm font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Short Bio</label>
            <textarea id="about-short" rows="4" class="w-full bg-bg border border-fg/20 px-4 py-2 text-fg focus:outline-none focus:border-accent" oninput="updateData('about', 'shortBio', this.value)"></textarea>
          </div>
          <div>
            <label class="block text-sm font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Extended Bio (Paragraph 1)</label>
            <textarea id="about-ext1" rows="5" class="w-full bg-bg border border-fg/20 px-4 py-2 text-fg focus:outline-none focus:border-accent" oninput="updateData('about', 'extendedBio1', this.value)"></textarea>
          </div>
          <div>
            <label class="block text-sm font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Extended Bio (Paragraph 2)</label>
            <textarea id="about-ext2" rows="5" class="w-full bg-bg border border-fg/20 px-4 py-2 text-fg focus:outline-none focus:border-accent" oninput="updateData('about', 'extendedBio2', this.value)"></textarea>
          </div>
        </div>

        <!-- PROJECTS TAB -->
        <div id="tab-projects" class="tab-content hidden">
          <div class="flex justify-between items-center mb-6 border-b border-fg/10 pb-2">
            <h2 class="text-xl font-bold font-mono uppercase tracking-widest text-accent">Manage Projects</h2>
            <button onclick="addProject()" class="bg-accent/10 text-accent hover:bg-accent hover:text-white px-4 py-2 border border-accent text-sm font-mono uppercase tracking-wider transition">Add Project</button>
          </div>
          <div id="projects-list" class="space-y-6"></div>
        </div>

        <!-- PUBLICATIONS TAB -->
        <div id="tab-publications" class="tab-content hidden">
          <div class="flex justify-between items-center mb-6 border-b border-fg/10 pb-2">
            <h2 class="text-xl font-bold font-mono uppercase tracking-widest text-accent">Manage Publications</h2>
            <button onclick="addPublication()" class="bg-accent/10 text-accent hover:bg-accent hover:text-white px-4 py-2 border border-accent text-sm font-mono uppercase tracking-wider transition">Add Publication</button>
          </div>
          <div id="publications-list" class="space-y-6"></div>
        </div>

        <!-- TEACHING TAB -->
        <div id="tab-teaching" class="tab-content hidden">
          <div class="flex justify-between items-center mb-6 border-b border-fg/10 pb-2">
            <h2 class="text-xl font-bold font-mono uppercase tracking-widest text-accent">Manage Teaching & Experience</h2>
            <button onclick="addTeachingOrg()" class="bg-accent/10 text-accent hover:bg-accent hover:text-white px-4 py-2 border border-accent text-sm font-mono uppercase tracking-wider transition">Add Organization</button>
          </div>
          <div id="teaching-list" class="space-y-8"></div>
        </div>

        <!-- STATS TAB -->
        <div id="tab-stats" class="tab-content hidden">
          <div class="flex justify-between items-center mb-6 border-b border-fg/10 pb-2">
            <h2 class="text-xl font-bold font-mono uppercase tracking-widest text-accent">Manage Statistics</h2>
            <button onclick="addStat()" class="bg-accent/10 text-accent hover:bg-accent hover:text-white px-4 py-2 border border-accent text-sm font-mono uppercase tracking-wider transition">Add Statistic</button>
          </div>
          <div id="stats-list" class="space-y-4"></div>
        </div>

      </main>
    </div>
  </div>

  <script>
    let siteData = {};
    const VALID_HASH = '2fff2e6c12b3866d026c4c8be5fdd4fa731e08dcea568afaf46a758252500c3b'; // SHA-256 of hirak@sarkar9486
    
    // Check Initialization
    const sessionAuth = sessionStorage.getItem('admin_auth');

    if (sessionAuth === VALID_HASH) {
      loadDataAndShowDashboard();
    }

    async function login() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      
      const passHash = CryptoJS.SHA256(pass).toString();
      
      if(user !== 'hiraksarkar' || passHash !== VALID_HASH) {
        errorDiv.textContent = "Invalid credentials.";
        errorDiv.classList.remove('hidden');
        return;
      }
      
      // Success
      errorDiv.classList.add('hidden');
      sessionStorage.setItem('admin_auth', passHash);
      loadDataAndShowDashboard();
    }

    async function loadDataAndShowDashboard() {
      document.getElementById('login-text').textContent = "Loading Database...";
      document.getElementById('login-loader').classList.remove('hidden');

      try {
        const res = await fetch('/data.json');
        
        if(res.ok) {
          siteData = await res.json();
          populateForms();
          
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
        } else {
          throw new Error();
        }
      } catch (err) {
        document.getElementById('login-error').textContent = "Failed to load database. Is the server running?";
        document.getElementById('login-error').classList.remove('hidden');
      } finally {
        document.getElementById('login-text').textContent = "Login";
        document.getElementById('login-loader').classList.add('hidden');
      }
    }

    function logout() {
      sessionStorage.removeItem('admin_auth');
      window.location.reload();
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tabId)?.classList.remove('hidden');
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('bg-fg', 'text-bg');
        btn.classList.add('text-fg', 'hover:bg-bg');
      });
      event.target.classList.remove('text-fg', 'hover:bg-bg');
      event.target.classList.add('bg-fg', 'text-bg');
    }

    function populateForms() {
      if(!siteData.about) siteData.about = {};
      document.getElementById('about-exp').value = siteData.about.experienceYears || '';
      document.getElementById('about-short').value = siteData.about.shortBio || '';
      document.getElementById('about-ext1').value = siteData.about.extendedBio1 || '';
      document.getElementById('about-ext2').value = siteData.about.extendedBio2 || '';
      
      renderProjects();
      renderPublications();
      renderTeaching();
      renderStats();
    }

    function updateData(section, key, value) {
      if(!siteData[section]) siteData[section] = {};
      siteData[section][key] = value;
    }

    // PROJECTS
    function renderProjects() {
      const list = document.getElementById('projects-list');
      list.innerHTML = '';
      if(!siteData.projects) siteData.projects = [];
      
      siteData.projects.forEach((proj, idx) => {
        const div = document.createElement('div');
        div.className = 'bg-card border border-fg/10 p-6 shadow-[0_4px_16px_rgba(26,23,20,0.06)] relative group';
        div.innerHTML = `
          <button onclick="deleteProject(${idx})" class="absolute top-4 right-4 text-accent hover:text-accent-bright text-xs font-mono uppercase tracking-widest hidden group-hover:block transition border border-transparent">Delete X</button>
          <div class="grid grid-cols-2 gap-6 mb-4">
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">ID / Number</label>
              <input type="text" value="${proj.id}" onchange="updateProject(${idx}, 'id', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Project Name</label>
              <input type="text" value="${proj.name}" onchange="updateProject(${idx}, 'name', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Description</label>
            <textarea onchange="updateProject(${idx}, 'desc', this.value)" rows="3" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">${proj.desc}</textarea>
          </div>
          <div>
            <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Tags (comma separated)</label>
            <input type="text" value="${(proj.tags || []).join(', ')}" onchange="updateProjectTags(${idx}, this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
          </div>
        `;
        list.appendChild(div);
      });
    }

    function addProject() { siteData.projects.unshift({ id: "00", name: "New Project", desc: "", tags: [] }); renderProjects(); }
    function deleteProject(idx) { if(confirm('Delete project?')) { siteData.projects.splice(idx, 1); renderProjects(); } }
    function updateProject(idx, key, val) { siteData.projects[idx][key] = val; }
    function updateProjectTags(idx, val) { siteData.projects[idx].tags = val.split(',').map(t => t.trim()).filter(t => t); }

    // PUBLICATIONS
    function renderPublications() {
      const list = document.getElementById('publications-list');
      list.innerHTML = '';
      if(!siteData.publications) siteData.publications = [];
      
      siteData.publications.forEach((pub, idx) => {
        const div = document.createElement('div');
        div.className = 'bg-card border border-fg/10 p-6 shadow-[0_4px_16px_rgba(26,23,20,0.06)] relative group';
        div.innerHTML = `
          <button onclick="deletePublication(${idx})" class="absolute top-4 right-4 text-accent hover:text-accent-bright text-xs font-mono uppercase tracking-widest hidden group-hover:block transition border border-transparent">Delete X</button>
          <div class="grid grid-cols-2 gap-6 mb-4">
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Year</label>
              <input type="text" value="${pub.year || ''}" onchange="updatePublication(${idx}, 'year', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Impact Factor (optional)</label>
              <input type="text" value="${pub.impactFactor || ''}" onchange="updatePublication(${idx}, 'impactFactor', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
          </div>
          <div class="mb-4">
            <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Title</label>
            <input type="text" value="${pub.title || ''}" onchange="updatePublication(${idx}, 'title', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
          </div>
          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Venue (Journal/Conf)</label>
              <input type="text" value="${pub.venue || ''}" onchange="updatePublication(${idx}, 'venue', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Link URL (optional)</label>
              <input type="text" value="${pub.link || ''}" onchange="updatePublication(${idx}, 'link', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function addPublication() { siteData.publications.unshift({ year: "2026", title: "New Publication", venue: "Journal Name", link: "", impactFactor: "" }); renderPublications(); }
    function deletePublication(idx) { if(confirm('Delete publication?')) { siteData.publications.splice(idx, 1); renderPublications(); } }
    function updatePublication(idx, key, val) { siteData.publications[idx][key] = val; }

    // TEACHING & EXPERIENCE
    function renderTeaching() {
      const list = document.getElementById('teaching-list');
      list.innerHTML = '';
      if(!siteData.teaching) siteData.teaching = [];
      
      siteData.teaching.forEach((org, orgIdx) => {
        const div = document.createElement('div');
        div.className = 'bg-bg border border-fg/10 p-6 shadow-sm relative group';
        
        let coursesHtml = (org.courses || []).map((c, cIdx) => `
          <div class="flex gap-4 items-end mb-3">
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-fg/50 uppercase tracking-wider">Course Name</label>
              <input type="text" value="${c.course || ''}" onchange="updateTeachingCourse(${orgIdx}, ${cIdx}, 'course', this.value)" class="w-full bg-card border border-fg/20 px-2 py-1 text-sm text-fg focus:outline-none focus:border-accent">
            </div>
            <div class="flex-1">
              <label class="block text-[10px] font-bold text-fg/50 uppercase tracking-wider">Level / Description</label>
              <input type="text" value="${c.level || ''}" onchange="updateTeachingCourse(${orgIdx}, ${cIdx}, 'level', this.value)" class="w-full bg-card border border-fg/20 px-2 py-1 text-sm text-fg focus:outline-none focus:border-accent">
            </div>
            <button onclick="deleteTeachingCourse(${orgIdx}, ${cIdx})" class="text-accent hover:text-red-600 text-xs font-mono uppercase tracking-wider px-2 py-1 border border-transparent">Del</button>
          </div>
        `).join('');

        div.innerHTML = `
          <button onclick="deleteTeachingOrg(${orgIdx})" class="absolute top-4 right-4 text-accent hover:text-accent-bright text-xs font-mono uppercase tracking-widest transition border border-transparent">Delete Org</button>
          <div class="grid grid-cols-2 gap-6 mb-6 w-3/4">
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Organization Name</label>
              <input type="text" value="${org.org || ''}" onchange="updateTeachingOrg(${orgIdx}, 'org', this.value)" class="w-full bg-card border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent font-bold">
            </div>
            <div>
              <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Duration (e.g. 2017-2023)</label>
              <input type="text" value="${org.duration || ''}" onchange="updateTeachingOrg(${orgIdx}, 'duration', this.value)" class="w-full bg-card border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
            </div>
          </div>
          <div class="pl-4 border-l-2 border-accent/30">
            <h4 class="text-xs font-bold font-mono uppercase tracking-wider mb-3">Courses / Roles</h4>
            ${coursesHtml}
            <button onclick="addTeachingCourse(${orgIdx})" class="text-xs font-mono uppercase tracking-wider text-fg/60 hover:text-fg mt-2 border border-fg/20 px-3 py-1">+ Add Course</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function addTeachingOrg() { siteData.teaching.unshift({ org: "New Org", duration: "2026", courses: [] }); renderTeaching(); }
    function deleteTeachingOrg(idx) { if(confirm('Delete organization?')) { siteData.teaching.splice(idx, 1); renderTeaching(); } }
    function updateTeachingOrg(idx, key, val) { siteData.teaching[idx][key] = val; }
    
    function addTeachingCourse(orgIdx) { 
      if(!siteData.teaching[orgIdx].courses) siteData.teaching[orgIdx].courses = [];
      siteData.teaching[orgIdx].courses.push({ course: "New Course", level: "Description" });
      renderTeaching();
    }
    function deleteTeachingCourse(orgIdx, cIdx) {
      if(confirm('Delete course?')) { siteData.teaching[orgIdx].courses.splice(cIdx, 1); renderTeaching(); }
    }
    function updateTeachingCourse(orgIdx, cIdx, key, val) { siteData.teaching[orgIdx].courses[cIdx][key] = val; }

    // STATISTICS
    function renderStats() {
      const list = document.getElementById('stats-list');
      list.innerHTML = '';
      if(!siteData.stats) siteData.stats = [];
      
      siteData.stats.forEach((stat, idx) => {
        const div = document.createElement('div');
        div.className = 'flex gap-4 items-end bg-card border border-fg/10 p-4 shadow-sm';
        div.innerHTML = `
          <div class="flex-1">
            <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Number / Value</label>
            <input type="text" value="${stat.num || ''}" onchange="updateStat(${idx}, 'num', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
          </div>
          <div class="flex-[2]">
            <label class="block text-xs font-bold text-fg/70 mb-1 font-mono uppercase tracking-wider">Label</label>
            <input type="text" value="${stat.label || ''}" onchange="updateStat(${idx}, 'label', this.value)" class="w-full bg-bg border border-fg/20 px-3 py-2 text-fg focus:outline-none focus:border-accent">
          </div>
          <button onclick="deleteStat(${idx})" class="bg-bg border border-fg/20 hover:border-accent hover:text-accent px-4 py-2 text-xs font-mono uppercase tracking-wider transition">Delete</button>
        `;
        list.appendChild(div);
      });
    }

    function addStat() { siteData.stats.push({ num: "10+", label: "New Stat" }); renderStats(); }
    function deleteStat(idx) { if(confirm('Delete statistic?')) { siteData.stats.splice(idx, 1); renderStats(); } }
    function updateStat(idx, key, val) { siteData.stats[idx][key] = val; }

    async function saveChanges() {
      const authHash = sessionStorage.getItem('admin_auth');
      
      document.getElementById('save-text').textContent = "Saving...";
      document.getElementById('save-loader').classList.remove('hidden');

      try {
        const res = await fetch('/api/save', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            auth: authHash,
            data: siteData
          })
        });
        
        if(res.ok) {
          const msg = document.getElementById('status-msg');
          msg.classList.remove('hidden');
          setTimeout(() => msg.classList.add('hidden'), 3000);
        } else {
          alert('Failed to save. Unauthorized or server error.');
        }
      } catch(err) {
        alert('Network error while saving. Is the server running?');
      } finally {
        document.getElementById('save-text').textContent = "Save Database";
        document.getElementById('save-loader').classList.add('hidden');
      }
    }
  </script>
</body>
</html>
